name: Refresh OpenClaw docs

on:
  schedule:
    - cron: "0 6 * * *"          # daily at 06:00 UTC
  workflow_dispatch: {}            # manual trigger from the Actions tab
  push:
    branches: [main]
    paths:
      - flatten_docs.py
      - .github/workflows/refresh.yml
      - scripts/lookup.py

permissions:
  contents: write                  # needed to commit refreshed docs and create releases

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this skill repo
        uses: actions/checkout@v4

      - name: Checkout upstream openclaw/openclaw
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          path: upstream
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Flatten docs + generate indexes
        run: |
          python3 flatten_docs.py --repo upstream --skill-dir . --no-pull

      - name: Smoke-test lookup CLI + index integrity
        run: |
          bash scripts/smoke_test.sh

      - name: Publish per-version files as GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # For each version triplet on disk (excluding latest.*), publish to a
          # release tagged v<version> and remove the per-version files from the
          # working tree. Only the latest.* triplet remains committed.
          #
          # Asset upload policy: --clobber to allow re-publishing after a flatten
          # script improvement. Cache invalidation is the consumer's responsibility
          # (lookup.py supports --refresh; raw release-asset URLs are stable but
          # not guaranteed byte-identical for an existing tag).
          shopt -s nullglob
          for md in versions/openclaw-docs.*.md; do
            base=$(basename "$md" .md)            # openclaw-docs.<version>
            [ "$base" = "openclaw-docs.latest" ] && continue
            ver="${base#openclaw-docs.}"          # <version>
            tag="v${ver}"
            toc="versions/${base}.toc.jsonl"
            sec="versions/${base}.sections.jsonl"

            # Create release if it doesn't exist yet (idempotent).
            if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Creating release $tag..."
              gh release create "$tag" \
                --repo "$GITHUB_REPOSITORY" \
                --title "OpenClaw docs ${ver}" \
                --notes "Snapshot of OpenClaw ${ver} flattened docs and retrieval indexes. Generated by CI from openclaw/openclaw@main."
            fi

            echo "Uploading assets for $tag..."
            gh release upload "$tag" "$md" "$toc" "$sec" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber

            rm -f "$md" "$toc" "$sec"
          done

      - name: Sync versions/releases.json from GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Source-of-truth for the version archive is the actual list of
          # GitHub Releases. Mirror it into versions/releases.json so consumers
          # (and INDEX.md) have a deterministic local listing without API calls.
          gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --limit 1000 \
            --json tagName,publishedAt \
            > /tmp/releases-raw.json
          python3 scripts/_sync_releases_manifest.py \
            < /tmp/releases-raw.json \
            > versions/releases.json

      - name: Re-render INDEX.md against the fresh manifest
        run: |
          # flatten_docs.py reads versions/releases.json to produce INDEX.md.
          # Re-run the index/latest-update path without re-flattening.
          python3 scripts/_render_index.py

      - name: Build + upload skill ZIP to the current release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Package a self-contained ZIP that's installable in any harness
          # accepting Skill ZIP uploads (Claude Skills, Manus, Codex, etc.).
          # Excludes CI-only files (flatten_docs.py, _sync_releases_manifest.py,
          # _render_index.py) since consumers don't run them.
          VERSION=$(python3 -c "import json,pathlib; print(json.loads(pathlib.Path('upstream/package.json').read_text())['version'])")
          TAG="v${VERSION}"
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "No release $TAG yet; skipping ZIP attach (it'll be re-built next run)."
            exit 0
          fi
          ZIP=/tmp/openclaw-docs-skill.zip
          rm -f "$ZIP"
          zip -r "$ZIP" \
            SKILL.md \
            README.md \
            agents \
            scripts/lookup.py \
            scripts/update.py \
            scripts/smoke_test.sh \
            versions/openclaw-docs.latest.md \
            versions/openclaw-docs.latest.toc.jsonl \
            versions/openclaw-docs.latest.sections.jsonl \
            versions/INDEX.md \
            versions/releases.json
          echo "ZIP size: $(du -h "$ZIP" | cut -f1)"
          gh release upload "$TAG" "$ZIP" --repo "$GITHUB_REPOSITORY" --clobber
          echo "Attached openclaw-docs-skill.zip to release $TAG."

      - name: Commit refreshed latest.* + INDEX.md
        run: |
          git config user.name  "openclaw-docs-bot"
          git config user.email "openclaw-docs-bot@users.noreply.github.com"
          git add versions/INDEX.md \
                  versions/openclaw-docs.latest.md \
                  versions/openclaw-docs.latest.toc.jsonl \
                  versions/openclaw-docs.latest.sections.jsonl
          # Also stage any deletions of files that were committed before .gitignore
          # was introduced (one-time migration of pre-existing version triplets).
          git add -A versions/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            VERSION=$(python3 -c "import json,pathlib; print(json.loads(pathlib.Path('upstream/package.json').read_text())['version'])")
            git commit -m "Refresh OpenClaw docs to v${VERSION}"
            git push
          fi
