name: Refresh OpenClaw docs

on:
  schedule:
    - cron: "0 6 * * *"          # daily at 06:00 UTC
  workflow_dispatch: {}            # manual trigger from the Actions tab
  push:
    branches: [main]
    paths:
      - ci/**
      - skills/openclaw-docs/scripts/**
      - .github/workflows/refresh.yml

permissions:
  contents: write                  # needed to commit refreshed docs and create releases

env:
  SKILL_DIR: skills/openclaw-docs   # where the installed skill lives in this repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout upstream openclaw/openclaw
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          path: upstream
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Flatten docs + generate indexes
        run: |
          python3 ci/flatten_docs.py --repo upstream --skill-dir "$SKILL_DIR" --no-pull

      - name: Smoke-test lookup CLI + index integrity
        run: |
          cd "$SKILL_DIR" && bash scripts/smoke_test.sh

      - name: Embed + ingest new docs into Supabase
        # Idempotent: skips silently if the version is already in docs_chunks.
        # Skipped entirely (with a notice) if the required secrets aren't
        # configured — lets the rest of CI run for forks that don't have
        # Supabase wired.
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          SUPABASE_QUERY_KEY: ${{ secrets.SUPABASE_QUERY_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ] || [ -z "$SUPABASE_URL" ] || [ -z "$INGEST_TOKEN" ]; then
            echo "::notice::Skipping Supabase ingest — OPENROUTER_API_KEY / SUPABASE_URL / INGEST_TOKEN not configured."
            exit 0
          fi
          python3 ci/ci_ingest.py --skill-dir "$SKILL_DIR"

      - name: Publish per-version files as GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # For each version triplet on disk (excluding latest.*), publish to a
          # release tagged v<version> and remove the per-version files from the
          # working tree. Only the latest.* triplet remains committed.
          shopt -s nullglob
          for md in "$SKILL_DIR"/versions/openclaw-docs.*.md; do
            base=$(basename "$md" .md)            # openclaw-docs.<version>
            [ "$base" = "openclaw-docs.latest" ] && continue
            ver="${base#openclaw-docs.}"
            tag="v${ver}"
            toc="$SKILL_DIR/versions/${base}.toc.jsonl"
            sec="$SKILL_DIR/versions/${base}.sections.jsonl"

            if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Creating release $tag..."
              gh release create "$tag" \
                --repo "$GITHUB_REPOSITORY" \
                --title "OpenClaw docs ${ver}" \
                --notes "Snapshot of OpenClaw ${ver} flattened docs and retrieval indexes. Generated by CI from openclaw/openclaw@main."
            fi

            echo "Uploading assets for $tag..."
            gh release upload "$tag" "$md" "$toc" "$sec" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber

            rm -f "$md" "$toc" "$sec"
          done

      - name: Sync releases.json from GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --limit 1000 \
            --json tagName,publishedAt \
            > /tmp/releases-raw.json
          python3 ci/_sync_releases_manifest.py \
            < /tmp/releases-raw.json \
            > "$SKILL_DIR/versions/releases.json"

      - name: Re-render INDEX.md against the fresh manifest
        run: |
          python3 ci/_render_index.py --skill-dir "$SKILL_DIR"

      - name: Build + upload distribution ZIPs to the current release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Two ZIPs attached to each version's GitHub Release:
          #
          # 1. openclaw-docs-skill.zip — slim skill, SKILL.md at root.
          #    For Codex (~/.codex/skills/openclaw-docs/), Anthropic Skills
          #    (claude.ai upload), Manus, ChatGPT Custom GPT (knowledge file).
          #
          # 2. openclaw-docs-plugin.zip — full Claude Code plugin layout.
          #    For users who want a drag-and-drop install instead of git clone;
          #    extract into ~/.claude/plugins/openclaw-docs/.
          VERSION=$(python3 -c "import json,pathlib; print(json.loads(pathlib.Path('upstream/package.json').read_text())['version'])")
          TAG="v${VERSION}"
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "No release $TAG yet; skipping ZIP attach."
            exit 0
          fi

          # Skill ZIP (SKILL.md at root)
          SKILL_ZIP=/tmp/openclaw-docs-skill.zip
          rm -f "$SKILL_ZIP"
          (cd "$SKILL_DIR" && zip -r "$SKILL_ZIP" \
            SKILL.md \
            agents \
            scripts/lookup.py \
            scripts/update.py \
            scripts/smoke_test.sh \
            versions/openclaw-docs.latest.md \
            versions/openclaw-docs.latest.toc.jsonl \
            versions/openclaw-docs.latest.sections.jsonl \
            versions/INDEX.md \
            versions/releases.json)
          echo "Skill ZIP size: $(du -h "$SKILL_ZIP" | cut -f1)"

          # Plugin ZIP (Claude Code layout: .claude-plugin/ + .mcp.json at root)
          PLUGIN_ZIP=/tmp/openclaw-docs-plugin.zip
          rm -f "$PLUGIN_ZIP"
          zip -r "$PLUGIN_ZIP" \
            .claude-plugin \
            .mcp.json \
            README.md \
            "$SKILL_DIR/SKILL.md" \
            "$SKILL_DIR/agents" \
            "$SKILL_DIR/scripts/lookup.py" \
            "$SKILL_DIR/scripts/update.py" \
            "$SKILL_DIR/scripts/smoke_test.sh" \
            "$SKILL_DIR/versions/openclaw-docs.latest.md" \
            "$SKILL_DIR/versions/openclaw-docs.latest.toc.jsonl" \
            "$SKILL_DIR/versions/openclaw-docs.latest.sections.jsonl" \
            "$SKILL_DIR/versions/INDEX.md" \
            "$SKILL_DIR/versions/releases.json"
          echo "Plugin ZIP size: $(du -h "$PLUGIN_ZIP" | cut -f1)"

          gh release upload "$TAG" "$SKILL_ZIP" "$PLUGIN_ZIP" \
            --repo "$GITHUB_REPOSITORY" --clobber
          echo "Attached openclaw-docs-skill.zip + openclaw-docs-plugin.zip to release $TAG."

      - name: Commit refreshed latest.* + INDEX.md
        run: |
          git config user.name  "openclaw-docs-bot"
          git config user.email "openclaw-docs-bot@users.noreply.github.com"
          git add "$SKILL_DIR/versions/INDEX.md" \
                  "$SKILL_DIR/versions/openclaw-docs.latest.md" \
                  "$SKILL_DIR/versions/openclaw-docs.latest.toc.jsonl" \
                  "$SKILL_DIR/versions/openclaw-docs.latest.sections.jsonl" \
                  "$SKILL_DIR/versions/releases.json"
          git add -A "$SKILL_DIR/versions/"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            VERSION=$(python3 -c "import json,pathlib; print(json.loads(pathlib.Path('upstream/package.json').read_text())['version'])")
            git commit -m "Refresh OpenClaw docs to v${VERSION}"
            git push
          fi
